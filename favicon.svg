<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="fog" cx="50%" cy="50%" r="50%">
      <!-- sehr weiches Zentrum -->
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="25%" stop-color="white" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="88%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- schwarzer Hintergrund -->
  <rect width="64" height="64" fill="black"/>

  <!-- diffuser Glow -->
  <circle cx="32" cy="32" r="28" fill="url(#fog)"/>
</svg>
