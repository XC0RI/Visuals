<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gate Visual Studios</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    cursor: pointer;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  /* ===== RESPONSIVE GLOW (FIXED) ===== */
  .glow {
    position: fixed;
    left: 50%;
    top: 50%;
    width: min(55vmin, 620px);   /* kleiner und sicher */
    height: min(55vmin, 620px);
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(255,255,255,0.48) 0%,
      rgba(255,255,255,0.22) 25%,
      rgba(255,255,255,0.08) 45%,
      rgba(0,0,0,0) 70%
    );
    filter: blur(5vmin);         /* proportional aber kontrolliert */
    transition: transform 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
  }

  .pulse {
    transform: translate(-50%, -50%) scale(1.15);
    opacity: 0.9;
  }

  /* ===== TEXT BASE ===== */
  .label {
    position: fixed;
    bottom: 32px;
    color: #ffffff;
    font-size: clamp(14px, 1.4vw, 17px);
    line-height: 1.5;
    letter-spacing: 0.04em;
    font-weight: 300;
    user-select: none;
    pointer-events: none;
    max-width: 40vw;
  }

  .label-left {
    left: 36px;
    text-align: left;
  }

  .label-right {
    right: 36px;
    text-align: right;
  }

  .label strong {
    display: block;
    font-size: clamp(16px, 1.8vw, 20px);
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  /* ===== MOBILE FIX ===== */
  @media (max-width: 600px) {

    .glow {
      width: 52vmin;   /* kleiner auf mobile */
      height: 52vmin;
      filter: blur(6vmin);
    }

    .label {
      max-width: none;
      left: 20px !important;
      right: 20px !important;
      text-align: left;
      font-size: 15px;
    }

    /* stack texts vertically */
    .label-left {
      bottom: 72px;
    }

    .label-right {
      bottom: 28px;
    }
  }
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<div class="label label-left">
  <strong>Gate Visual Studios</strong>
  75018 Paris
</div>

<div class="label label-right">
  gate@visuals.xyz<br>
  0049 1512 9640529
</div>

<script>
  const glow = document.getElementById("glow");

  document.body.addEventListener("click", () => {
    glow.classList.add("pulse");
    setTimeout(() => glow.classList.remove("pulse"), 240);
  });
</script>

</body>
</html>
