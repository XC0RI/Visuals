<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Port Visuals</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    cursor: pointer;
  }

  .glow {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 520px;              /* größerer Kreis */
    height: 520px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(255,255,255,0.38) 0%,
      rgba(255,255,255,0.18) 25%,
      rgba(255,255,255,0.06) 45%,
      rgba(0,0,0,0) 70%
    );
    filter: blur(70px);        /* weichere Kante */
    transition: transform 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
  }

  .pulse {
    transform: translate(-50%, -50%) scale(1.25);
    opacity: 0.85;
  }
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<script>
  const glow = document.getElementById("glow");

  document.body.addEventListener("click", () => {
    glow.classList.add("pulse");
    setTimeout(() => glow.classList.remove("pulse"), 220);
  });
</script>

</body>
</html>
