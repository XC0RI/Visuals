<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gate Visual Studios</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    cursor: pointer;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  /* ===== RESPONSIVE GLOW ===== */
  .glow {
    position: fixed;
    left: 50%;
    top: 50%;
    width: min(70vmin, 780px);     /* skaliert mit Screen */
    height: min(70vmin, 780px);
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(255,255,255,0.48) 0%,
      rgba(255,255,255,0.22) 25%,
      rgba(255,255,255,0.08) 45%,
      rgba(0,0,0,0) 70%
    );
    filter: blur(6vmin);           /* proportionaler Blur */
    transition: transform 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
  }

  .pulse {
    transform: translate(-50%, -50%) scale(1.18);
    opacity: 0.9;
  }

  /* ===== BASE LABEL ===== */
  .label {
    position: fixed;
    bottom: clamp(18px, 4vh, 36px);
    color: #ffffff;
    font-size: clamp(13px, 1.6vw, 17px);  /* responsive text */
    line-height: 1.5;
    letter-spacing: 0.04em;
    font-weight: 300;
    user-select: none;
    pointer-events: none;
    max-width: 42vw;
  }

  /* links */
  .label-left {
    left: clamp(16px, 3vw, 36px);
    text-align: left;
  }

  /* rechts */
  .label-right {
    right: clamp(16px, 3vw, 36px);
    text-align: right;
  }

  /* Studio Name */
  .label strong {
    display: block;
    font-size: clamp(15px, 2vw, 19px);
    font-weight: 500;
    letter-spacing: 0.05em;
    color: #ffffff;
  }

  /* ===== EXTRA SMALL PHONES ===== */
  @media (max-width: 420px) {
    .label {
      max-width: 46vw;
    }
  }
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<!-- links -->
<div class="label label-left">
  <strong>Gate Visual Studios</strong>
  75018 Paris
</div>

<!-- rechts -->
<div class="label label-right">
  gate@visuals.xyz<br>
  0049 1512 9640529
</div>

<script>
  const glow = document.getElementById("glow");

  document.body.addEventListener("click", () => {
    glow.classList.add("pulse");
    setTimeout(() => glow.classList.remove("pulse"), 240);
  });
</script>

</body>
</html>
