<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Port Visuals</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    cursor: pointer;
  }

  #viewer {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    filter: grayscale(100%) blur(6px);
    transition: opacity 0.25s ease;
    user-select: none;
    pointer-events: none;
  }

  /* subtle fade */
  .fade {
    opacity: 0;
  }
</style>
</head>

<body>

<img id="viewer" src="" alt="" />

<script>
/* ===== CONFIG ===== */

const images = [
  "images/01.jpg",
  "images/02.jpg",
  "images/03.jpg",
  "images/04.jpg"
];

const viewer = document.getElementById("viewer");

/* ===== RANDOM PICK ===== */

function randomImage() {
  const i = Math.floor(Math.random() * images.length);
  return images[i];
}

/* ===== CHANGE IMAGE ===== */

function showRandom() {
  viewer.classList.add("fade");

  setTimeout(() => {
    viewer.src = randomImage();
    viewer.classList.remove("fade");
  }, 180);
}

/* ===== INITIAL LOAD ===== */

viewer.src = randomImage();

/* ===== CLICK HANDLER ===== */

document.body.addEventListener("click", showRandom);
</script>

</body>
</html>
