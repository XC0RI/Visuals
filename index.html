<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="format-detection" content="telephone=no" />
<title>Gate Visual Studios</title>

<!-- ===== ROBUSTES FAVICON ===== -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<rect width='64' height='64' fill='black'/>
<text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle'
font-family='Arial, Helvetica, sans-serif'
font-size='44'
fill='white'
transform='skewX(-18) scale(1.05,0.95)'>G</text>
</svg>">

<style>
html, body{
  margin:0;
  padding:0;
  background:#000;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  color:#fff;
}

.glow{
  position:fixed;
  left:50%;
  top:50%;
  width:min(62vmin,700px);
  height:min(62vmin,700px);
  transform:translate(-50%,-50%) scale(1);
  border-radius:50%;
  background:radial-gradient(
    circle,
    rgba(255,255,255,0.75) 0%,
    rgba(255,255,255,0.42) 25%,
    rgba(255,255,255,0.18) 45%,
    rgba(0,0,0,0) 72%
  );
  filter:blur(5.2vmin);
  pointer-events:none;
  z-index:10;
  transition:transform .35s cubic-bezier(.22,.61,.36,1), opacity .35s ease;
}
.glow.pulse{
  transform:translate(-50%,-50%) scale(1.18);
  opacity:.95;
}

.project-img{
  position:fixed;
  object-fit:contain;
  cursor:grab;
  user-select:none;
  touch-action:none;
  transform-origin:center center;
  transition:transform .12s linear;
}
.project-img:active{ cursor:grabbing; }
.project-img.zoom-mode{ cursor:zoom-out; }

a.mail-link{
  color:inherit;
  text-decoration:none;
  pointer-events:auto;
}
a.mail-link:hover{ text-decoration:underline; }

.label{
  position:fixed;
  bottom:32px;
  font-size:clamp(14px,1.4vw,17px);
  letter-spacing:.04em;
  font-weight:300;
  pointer-events:none;
}
.label-left{ left:36px; }
.label-right{ right:36px; text-align:right; }
.label-right a{ pointer-events:auto; }

.projects-btn{ position:fixed; top:28px; left:32px; cursor:pointer; }
.info-btn{ position:fixed; top:28px; right:32px; cursor:pointer; }
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<div class="projects-btn" id="projectsBtn">Projects</div>
<div class="info-btn" id="infoBtn">Info</div>

<div class="label label-left">
<strong>Gate Visual Studio</strong><br>
75018 Paris
</div>

<div class="label label-right">
<a href="mailto:gate@visuals.xyz" class="mail-link">gate@visuals.xyz</a><br>
0049 1512 9640529
</div>

<script>
const images=[
"./images/01.jpeg","./images/02.jpeg","./images/03.jpeg","./images/04.jpeg",
"./images/05.jpeg","./images/06.jpeg","./images/07.jpeg","./images/08.jpeg",
"./images/09.jpeg","./images/10.jpeg","./images/11.jpeg","./images/12.jpeg",
"./images/13.jpeg","./images/14.jpeg"
];

let imgIndex=0;
let zCounter=200;
const btn=document.getElementById("projectsBtn");
const glow=document.getElementById("glow");

/* ===== SPAWN ===== */
btn.addEventListener("click",(e)=>{
  e.stopPropagation();
  spawnImage();
});

function spawnImage(){
  const src=images[imgIndex%images.length];

  const img=document.createElement("img");
  img.crossOrigin="anonymous";
  img.src=src;
  img.className="project-img";
  img.dataset.scale=1;
  img.dataset.zoomActive="false";

  zCounter++;
  img.style.zIndex=zCounter;

  img.onload=()=>{
    const base=Math.min(window.innerWidth,window.innerHeight);
    img.style.width=Math.min(base*0.36,400)+"px";
  };

  img.style.left=(Math.random()*window.innerWidth*0.35+20)+"px";
  img.style.top =(Math.random()*window.innerHeight*0.35+20)+"px";

  enableZoom(img);
  makeDraggable(img);

  document.body.appendChild(img);
  imgIndex++;
}

/* ===== OPTION A ZOOM (stabil) ===== */
function enableZoom(img){

  img.addEventListener("wheel",(e)=>{
    if(img.dataset.zoomActive!=="true") return;
    e.preventDefault();

    let scale=parseFloat(img.dataset.scale);
    scale += (e.deltaY * -0.0015);
    scale=Math.min(Math.max(1,scale),3);

    img.dataset.scale=scale;
    img.style.transform=`scale(${scale})`;
  },{passive:false});
}

/* ===== DRAG (ANTI-ZITTERN) ===== */
function makeDraggable(el){
  let ox=0,oy=0,down=false;
  let startX=0,startY=0;
  let moved=false;

  const start=(x,y)=>{
    down=true;
    moved=false;
    startX=x;
    startY=y;
    ox=x-el.offsetLeft;
    oy=y-el.offsetTop;

    zCounter++;
    el.style.zIndex=zCounter;
  };

  const move=(x,y)=>{
    if(!down) return;

    if(Math.abs(x-startX)>4 || Math.abs(y-startY)>4){
      moved=true;
    }

    el.style.left=(x-ox)+"px";
    el.style.top =(y-oy)+"px";
  };

  const end=()=>{
    if(!moved){
      toggleZoom(el);
    }
    down=false;
  };

  el.addEventListener("mousedown",e=>{
    e.preventDefault();
    start(e.clientX,e.clientY);
  });

  window.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
  window.addEventListener("mouseup",end);

  el.addEventListener("touchstart",e=>{
    const t=e.touches[0];
    start(t.clientX,t.clientY);
  },{passive:false});

  window.addEventListener("touchmove",e=>{
    const t=e.touches[0];
    if(t) move(t.clientX,t.clientY);
  },{passive:false});

  window.addEventListener("touchend",end);
}

/* ===== ZOOM TOGGLE ===== */
function toggleZoom(img){
  const active = img.dataset.zoomActive==="true";

  if(active){
    img.dataset.zoomActive="false";
    img.dataset.scale=1;
    img.style.transform="scale(1)";
    img.classList.remove("zoom-mode");
  }else{
    img.dataset.zoomActive="true";
    img.classList.add("zoom-mode");
  }
}

/* ===== GLOW ===== */
document.body.addEventListener("click",()=>{
  glow.classList.add("pulse");
  setTimeout(()=>glow.classList.remove("pulse"),320);
});
</script>

</body>
</html>
