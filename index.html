<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gate Visual Studios</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    cursor: pointer;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  /* ===== GLOW ===== */
  .glow {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 780px;
    height: 780px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(255,255,255,0.48) 0%,
      rgba(255,255,255,0.22) 25%,
      rgba(255,255,255,0.08) 45%,
      rgba(0,0,0,0) 70%
    );
    filter: blur(90px);
    transition: transform 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
  }

  .pulse {
    transform: translate(-50%, -50%) scale(1.22);
    opacity: 0.9;
  }

  /* ===== LABEL BASE ===== */
  .label {
    position: fixed;
    bottom: 28px;
    color: #ffffff;
    font-size: 15px;          /* ← größer */
    line-height: 1.5;
    letter-spacing: 0.04em;
    font-weight: 400;
    user-select: none;
    pointer-events: none;
  }

  /* links */
  .label-left {
    left: 32px;
    text-align: left;
  }

  /* rechts */
  .label-right {
    right: 32px;
    text-align: right;
  }

  .label strong {
    display: block;
    font-weight: 500;
    color: #ffffff;
  }
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<!-- links -->
<div class="label label-left">
  <strong>Gate Visual Studios</strong>
  75018 Paris
</div>

<!-- rechts -->
<div class="label label-right">
  gate@visuals.xyz<br>
  0049 1512 9640529
</div>

<script>
  const glow = document.getElementById("glow");

  document.body.addEventListener("click", () => {
    glow.classList.add("pulse");
    setTimeout(() => glow.classList.remove("pulse"), 240);
  });
</script>

</body>
</html>
